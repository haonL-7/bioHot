name: Daily Update & Deploy

on:
  schedule:
    - cron: "37 18 * * *"  # Every day 18:37 UTC (Beijing 02:37, off-peak to avoid :00/:30 rush)

  workflow_dispatch:
    inputs:
      max_articles:
        description: '最多评估文章数'
        required: false
        default: '50'
        type: string

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ai-news
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl news
        id: crawl
        continue-on-error: true
        run: python scripts/crawler.py
        timeout-minutes: 5

      - name: AI evaluate
        id: evaluate
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          MAX_ARTICLES: ${{ github.event.inputs.max_articles || '50' }}
        run: python scripts/ai_evaluator.py
        timeout-minutes: 15

      - name: Build site
        id: build
        run: python scripts/build.py
        timeout-minutes: 2

      - name: Lightweight curation — All channels
        id: curate-all
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          for ch in computational-genomics metagenomics-informatics structural-bioinformatics systems-biology ml-biology single-cell-omics databases-knowledge-graphs ai-drug-discovery; do
            echo "=== $ch ==="
            python lightweight/build_channel.py $ch
          done
        timeout-minutes: 60

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ai-news/_site
          publish_branch: gh-pages
          commit_message: "auto: update AI news"

      - name: Summary
        if: always()
        run: |
          echo "========================================="
          echo "  Daily Update & Deploy - Summary"
          echo "========================================="
          if [ -f data/stats.json ]; then
            python scripts/print_stats.py
          else
            echo "  WARNING: stats.json not found"
          fi
          echo "  Site: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "========================================="
